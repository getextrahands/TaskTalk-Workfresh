<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WorkFresh Pro OS</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="WorkFresh">
    <meta name="theme-color" content="#ffffff">
    
    <link rel="icon" type="image/png" href="https://res.cloudinary.com/dwmsgnm4p/image/upload/q_auto/f_auto/v1778012864/w_lou9fx.png">
    <link rel="apple-touch-icon" href="https://res.cloudinary.com/dwmsgnm4p/image/upload/q_auto/f_auto/v1778012864/w_lou9fx.png">
    <link rel="manifest" href="manifest.json">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase Compat -->
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-auth-compat.js"></script>

    <style>
        :root { --app-bg: #f4f6f9; }
        body { 
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; height: 100vh; width: 100vw; overflow: hidden; position: fixed;
        }
        .app-container {
            height: 100%; width: 100%; display: flex; flex-direction: column;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            background-color: #f4f6f9;
        }
        .glass-dock { 
            backdrop-filter: blur(40px) saturate(200%); 
            background: rgba(255,255,255,0.8);
            border-top: 1px solid rgba(0,0,0,0.05);
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        .view-transition { animation: slideIn 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); }
        
        .dial-btn {
            aspect-ratio: 1/1; border-radius: 9999px; background-color: #ffffff;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; transition: all 0.1s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .dial-btn:active { background-color: #f1f5f9; transform: scale(0.92); }

        .timeline-line { position: absolute; left: 8px; top: 0; bottom: 0; width: 1px; background: #e2e8f0; }
        .timeline-dot { position: absolute; left: 5px; top: 12px; width: 7px; height: 7px; border-radius: 50%; background: #cbd5e1; border: 2px solid #fff; box-shadow: 0 0 0 4px #fff; }
        .timeline-dot.active { background: #3b82f6; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyB-n1St2D0c5k66udqtrktzWWgYDtoBjIM",
            authDomain: "tasktalk-professional.firebaseapp.com",
            projectId: "tasktalk-professional",
            storageBucket: "tasktalk-professional.firebasestorage.app",
            messagingSenderId: "1038829850811",
            appId: "1:1038829850811:web:14f1df9220253b2d87999e"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const targetAppId = "workfresh-pro-production";

        // VERIFIED COMPLETE ICONS OBJECT
        const Icons = {
            Console: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>,
            Users: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
            Board: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>,
            Globe: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>,
            Message: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>,
            Shield: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
            FileText: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>,
            Settings: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
            Back: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="m15 18-6-6 6-6"/></svg>,
            Plus: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
            Phone: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7 2 2 0 0 1 1.72 2.23z"/></svg>,
            MapPin: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>,
            Briefcase: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>,
            Dashboard: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><path d="M9 3v18"/><path d="M15 3v18"/><path d="M3 9h18"/><path d="M3 15h18"/></svg>,
            Send: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>,
            Hash: () => <svg className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="15" x2="20" y2="15"/><line x1="10" y1="3" x2="8" y2="21"/><line x1="16" y1="3" x2="14" y2="21"/></svg>,
            Clock: () => <svg className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
            User: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
            Mobile: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>,
            Menu: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
        };

        const Avatar = ({ src, name, size="w-14 h-14" }) => {
            if (src) return <img src={src} className={`${size} rounded-2xl object-cover border border-white shadow-sm`} />;
            const initials = name?.split(" ").filter(Boolean).map(n => n[0]).join("") || "W";
            return (
                <div className={`${size} rounded-2xl bg-gray-200 flex items-center justify-center text-sm font-semibold text-gray-600 border border-white shadow-sm`}>
                    {initials}
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [tab, setTab] = useState("console"); 
            const [selectedClient, setSelectedClient] = useState(null);
            const [selectedContact, setSelectedContact] = useState(null);
            const [selectedFacility, setSelectedFacility] = useState(null);
            
            const [clientTab, setClientTab] = useState("contacts");
            const [contactSubTab, setContactSubTab] = useState("profile");
            const [facilityTab, setFacilityTab] = useState("jobs");

            const [clients, setClients] = useState([]);
            const [contacts, setContacts] = useState([]);
            const [facilities, setFacilities] = useState([]);

            const getCol = (name) => db.collection("artifacts").doc(targetAppId).collection("public").doc("data").collection(name);

            useEffect(() => {
                auth.signInAnonymously().then(u => setUser(u.user));
            }, []);

            useEffect(() => {
                if (!user) return;

                const setupListener = (colName, setter, seedData = []) => {
                    return getCol(colName).onSnapshot(snap => {
                        if (snap.empty && seedData.length > 0) {
                            seedData.forEach(item => {
                                const id = item.id || crypto.randomUUID();
                                const { id: _, ...data } = item;
                                getCol(colName).doc(id).set({ 
                                    ...data, 
                                    created_at: firebase.firestore.FieldValue.serverTimestamp(),
                                    updated_at: firebase.firestore.FieldValue.serverTimestamp()
                                });
                            });
                        }
                        setter(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                    });
                };

                const unsubs = [
                    setupListener("wf2_clients", setClients, [
                        { id: "c1", wf2_company_name: "Riverside Construction", wf2_client_number: "C-222-001", wf2_client_status: "ACTIVE", wf2_logo: "https://i.pravatar.cc/150?u=riverside", wf2_term_type: "NET 30" },
                        { id: "c2", wf2_company_name: "Chen Logistics", wf2_client_number: "C-222-002", wf2_client_status: "ACTIVE", wf2_logo: "https://i.pravatar.cc/150?u=chen", wf2_term_type: "DUE ON RECEIPT" }
                    ]),
                    setupListener("wf2_client_contacts", setContacts, [
                        { id: "cc1", wf2_parent_client: "c1", wf2_ah_first_name: "John", wf2_ah_last_name: "Rivers", wf2_ah_email: "john@riverside.com", wf2_ah_phone: "555-0101", wf2_ah_profile_image: "https://i.pravatar.cc/150?u=jr", wf2_ah_role: "PRIMARY" },
                        { id: "cc2", wf2_parent_client: "c1", wf2_ah_first_name: "Alice", wf2_ah_last_name: "Meyers", wf2_ah_email: "ap@riverside.com", wf2_ah_phone: "555-0102", wf2_ah_profile_image: "https://i.pravatar.cc/150?u=am", wf2_ah_role: "BILLING" }
                    ]),
                    setupListener("wf2_facilities", setFacilities, [
                        { id: "f1", wf2_client: "c1", wf2_facility_name: "Oakland Site Yard", wf2_facility_address: "888 Harbor Way, Oakland, CA", wf2_site_code: "OKL-101", wf2_service_freq: "Daily" }
                    ])
                ];
                return () => unsubs.forEach(u => u());
            }, [user]);

            const apps = [
                { label: "Dashboard", icon: Icons.Dashboard, color: "bg-gray-900", action: () => setTab("dashboard") },
                { label: "Clients", icon: Icons.Users, color: "bg-blue-500", action: () => setTab("clients") },
                { label: "Board", icon: Icons.Board, color: "bg-black", action: () => setTab("board") },
                { label: "Locations", icon: Icons.Globe, color: "bg-green-500", action: () => setTab("locations") },
                { label: "Setup", icon: Icons.Settings, color: "bg-gray-400" },
                { label: "Address", icon: Icons.MapPin, color: "bg-orange-500" },
                { label: "Comms", icon: Icons.Message, color: "bg-pink-500" },
                { label: "Admin", icon: Icons.Shield, color: "bg-indigo-500" },
                { label: "Reports", icon: Icons.FileText, color: "bg-yellow-500" },
                { label: "Jobs", icon: Icons.Briefcase, color: "bg-emerald-600" }
            ];

            if (!user) return <div className="h-screen bg-white flex items-center justify-center font-black uppercase text-[10px] tracking-widest text-slate-300">Syncing Engine...</div>;

            return (
                <div className="app-container">
                    <div className="h-24 px-8 pt-8 flex flex-col justify-center shrink-0">
                        <div className="text-[10px] tracking-widest text-blue-500 font-bold uppercase mb-1">BUSINESS OS</div>
                        <div className="flex justify-between items-center">
                            <h1 className="text-2xl font-bold text-slate-900">
                                {selectedContact ? "Profile" : selectedFacility ? "Site Hub" : selectedClient ? "Client Hub" : tab === "console" ? "Console" : tab.charAt(0).toUpperCase() + tab.slice(1)}
                            </h1>
                            <span className="text-sm text-gray-500 tabular-nums">
                                {new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false })}
                            </span>
                        </div>
                    </div>

                    <div className="flex-1 overflow-y-auto no-scrollbar pb-32">
                        {tab === "console" && !selectedClient && !selectedFacility && !selectedContact && (
                            <div className="px-8 grid grid-cols-4 gap-y-10 gap-x-6 mt-6 view-transition">
                                {apps.map((app, i) => {
                                    const Icon = app.icon || (() => null);
                                    return (
                                        <div key={i} onClick={app.action} className="flex flex-col items-center gap-2 cursor-pointer active:scale-90 transition-transform text-center">
                                            <div className={`w-14 h-14 rounded-full flex items-center justify-center text-white shadow-sm ${app.color}`}>
                                                <Icon />
                                            </div>
                                            <span className="text-[10px] text-gray-500 uppercase font-medium">{app.label}</span>
                                        </div>
                                    );
                                })}
                            </div>
                        )}

                        {tab === "dashboard" && (
                            <div className="px-8 space-y-5 mt-4 view-transition">
                                <button onClick={() => setTab("console")} className="text-xs text-gray-500 flex items-center gap-1 font-semibold">
                                    <Icons.Back /> Back
                                </button>
                                <div className="grid grid-cols-2 gap-3">
                                    {[
                                        { label: "Jobs", val: "14" },
                                        { label: "Completed", val: "128" },
                                        { label: "Clients", val: clients.length },
                                        { label: "Scheduled", val: "42" }
                                    ].map((t,i)=>(
                                        <div key={i} className="p-5 rounded-[1.8rem] bg-white shadow-sm border border-white">
                                            <p className="text-[10px] text-gray-400 font-black uppercase tracking-widest mb-1">{t.label}</p>
                                            <p className="text-2xl font-black text-slate-900">{t.val}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {tab === "clients" && !selectedClient && (
                            <div className="px-8 space-y-4 mt-2 view-transition">
                                <div className="flex items-center justify-between mb-4">
                                    <button onClick={() => setTab("console")} className="w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center"><Icons.Back /></button>
                                    <button className="w-9 h-9 rounded-full bg-blue-600 flex items-center justify-center text-white shadow-lg"><Icons.Plus /></button>
                                </div>
                                <div className="bg-white rounded-xl p-3 border border-gray-200 text-sm text-gray-400 shadow-sm flex items-center gap-2 mb-4">
                                    <svg className="w-4 h-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                                    Search companies...
                                </div>
                                {clients.map((c, i) => (
                                    <div key={i} onClick={() => setSelectedClient(c)} className="bg-white p-4 rounded-[2rem] shadow-sm flex items-center gap-4 justify-between active:scale-[0.98] transition-all">
                                        <div className="flex items-center gap-3">
                                            <Avatar src={c.wf2_logo} name={c.wf2_company_name} />
                                            <div>
                                                <p className="font-bold text-slate-900 text-sm">{c.wf2_company_name}</p>
                                                <p className="text-xs text-gray-400 font-medium">{c.wf2_client_number}</p>
                                                <span className="text-[10px] text-blue-500 font-bold uppercase">
                                                    {contacts.filter(con => con.wf2_parent_client === c.id).length} Contacts
                                                </span>
                                            </div>
                                        </div>
                                        <span className="text-gray-300 text-xl font-light">›</span>
                                    </div>
                                ))}
                            </div>
                        )}

                        {tab === "board" && (
                            <div className="px-8 pt-4 space-y-8 view-transition">
                                {["PENDING", "IN PROGRESS", "DONE"].map(stage => (
                                    <div key={stage} className="space-y-3">
                                        <div className="flex items-center justify-between px-2">
                                            <span className="text-[10px] font-black text-slate-400 tracking-[0.2em]">{stage}</span>
                                            <span className="bg-slate-200 text-[10px] px-2 py-0.5 rounded-full font-bold">1</span>
                                        </div>
                                        <div className="bg-white p-5 rounded-[2rem] shadow-sm border border-white">
                                            <div className="flex justify-between items-start mb-4">
                                                <div>
                                                    <p className="font-bold text-slate-900">Facility Deep Clean</p>
                                                    <p className="text-[10px] text-slate-400 font-bold uppercase">Riverside Site</p>
                                                </div>
                                                <Avatar name="Tech User" size="w-8 h-8" />
                                            </div>
                                            <div className="flex items-center gap-2">
                                                <span className="px-2 py-0.5 bg-blue-50 text-blue-600 text-[8px] font-black rounded-full uppercase">Priority</span>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {tab === "locations" && !selectedFacility && (
                            <div className="px-8 pt-4 space-y-4 view-transition">
                                <div className="h-[200px] bg-slate-200 rounded-[2.5rem] relative overflow-hidden flex items-center justify-center text-slate-400 border-4 border-white shadow-lg">
                                    <Icons.Globe /> <span className="ml-2 font-black uppercase text-[10px] tracking-widest">Master Site Map</span>
                                </div>
                                <div className="space-y-3">
                                    {facilities.map(f => (
                                        <div key={f.id} onClick={() => setSelectedFacility(f)} className="bg-white p-5 rounded-[2.2rem] shadow-sm flex items-center gap-4 justify-between border border-white active:scale-95 transition-all">
                                            <div className="flex items-center gap-4">
                                                <div className="w-12 h-12 bg-emerald-50 text-emerald-600 rounded-2xl flex items-center justify-center"><Icons.MapPin /></div>
                                                <div>
                                                    <p className="font-black text-slate-900 text-sm">{f.wf2_facility_name}</p>
                                                    <p className="text-[10px] text-slate-400 font-bold uppercase">{f.wf2_site_code}</p>
                                                </div>
                                            </div>
                                            <span className="text-gray-300">›</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {selectedFacility && (
                            <div className="view-transition">
                                <div className="px-8 flex items-center justify-between mb-8">
                                    <button onClick={() => setSelectedFacility(null)} className="w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center"><Icons.Back /></button>
                                    <div className="text-center">
                                        <p className="text-lg font-bold text-slate-900 leading-tight">{selectedFacility.wf2_facility_name}</p>
                                        <p className="text-[10px] text-gray-400 font-bold uppercase tracking-widest">{selectedFacility.wf2_site_code}</p>
                                    </div>
                                    <div className="w-10" />
                                </div>

                                <div className="px-8">
                                    <div className="flex bg-slate-200/50 p-1 rounded-2xl mb-8">
                                        {['Jobs', 'Info', 'Media'].map(t => (
                                            <button key={t} onClick={() => setFacilityTab(t.toLowerCase())} className={`flex-1 py-2.5 rounded-xl text-[10px] font-black uppercase transition-all ${facilityTab === t.toLowerCase() ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-400'}`}>{t}</button>
                                        ))}
                                    </div>

                                    {facilityTab === 'jobs' && (
                                        <div className="space-y-3">
                                            <div className="bg-white p-5 rounded-[2.2rem] shadow-sm border border-white">
                                                <div className="flex justify-between items-center mb-4">
                                                    <span className="px-2 py-0.5 bg-emerald-100 text-emerald-700 text-[8px] font-black rounded-full uppercase">Active Assignment</span>
                                                    <span className="text-[9px] font-bold text-slate-300">NOW</span>
                                                </div>
                                                <div className="flex items-center gap-3">
                                                    <Avatar name="Carlos Tech" size="w-10 h-10" />
                                                    <div>
                                                        <p className="font-bold text-slate-900 text-sm">Carlos Mendez</p>
                                                        <p className="text-[9px] text-slate-400 font-black uppercase">Lead Technician</p>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {facilityTab === 'info' && (
                                        <div className="space-y-4">
                                            <div className="bg-white p-5 rounded-[2.2rem] shadow-sm border border-white">
                                                <p className="text-[9px] font-black text-slate-400 uppercase mb-1">Access Instructions</p>
                                                <p className="text-sm font-medium text-slate-700 leading-relaxed italic">"Enter through Gate 4. Code: 1299#. Check in with security at Dock 1."</p>
                                            </div>
                                            <div className="bg-white p-5 rounded-[2.2rem] shadow-sm border border-white">
                                                <p className="text-[9px] font-black text-slate-400 uppercase mb-3">Primary Site Contact</p>
                                                <div className="flex items-center justify-between">
                                                    <div className="flex items-center gap-3">
                                                        <div className="w-8 h-8 rounded-lg bg-blue-50 text-blue-600 flex items-center justify-center font-bold text-[10px]">JM</div>
                                                        <p className="font-bold text-slate-900 text-sm">Jim Madsen</p>
                                                    </div>
                                                    <Icons.Phone />
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {selectedClient && !selectedContact && (
                            <div className="view-transition">
                                <div className="px-8 flex items-center justify-between mb-8">
                                    <button onClick={() => setSelectedClient(null)} className="w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center"><Icons.Back /></button>
                                    <div className="text-center">
                                        <p className="text-lg font-bold text-slate-900 leading-tight">{selectedClient.wf2_company_name}</p>
                                        <p className="text-[10px] text-gray-400 font-bold uppercase tracking-widest">{selectedClient.wf2_client_number}</p>
                                    </div>
                                    <button className="w-10 h-10 flex items-center justify-center text-gray-400"><Icons.Menu /></button>
                                </div>

                                <div className="flex flex-col items-center mb-8">
                                    <Avatar src={selectedClient.wf2_logo} name={selectedClient.wf2_company_name} size="w-28 h-28" />
                                    <div className="flex gap-2 mt-4">
                                        <span className="px-4 py-1.5 bg-emerald-100 text-emerald-700 text-[10px] font-black rounded-full uppercase tracking-widest">ACTIVE</span>
                                        <span className="px-4 py-1.5 bg-blue-100 text-blue-700 text-[10px] font-black rounded-full uppercase tracking-widest">{selectedClient.wf2_term_type || 'NET 30'}</span>
                                    </div>
                                </div>

                                <div className="px-8">
                                    <div className="flex bg-slate-200/50 p-1 rounded-2xl mb-6">
                                        {['Contacts', 'Addresses', 'Details'].map(t => (
                                            <button key={t} onClick={() => setClientTab(t.toLowerCase())} className={`flex-1 py-2.5 rounded-xl text-[10px] font-black uppercase transition-all ${clientTab === t.toLowerCase() ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-400'}`}>{t}</button>
                                        ))}
                                    </div>

                                    {clientTab === 'contacts' && (
                                        <div className="space-y-3">
                                            {contacts.filter(c => c.wf2_parent_client === selectedClient.id).map(c => (
                                                <div key={c.id} onClick={() => { setSelectedContact(c); setContactSubTab("profile"); }} className="bg-white p-4 rounded-[2rem] shadow-sm flex items-center justify-between active:scale-95 transition-all border border-white">
                                                    <div className="flex items-center gap-3">
                                                        <Avatar src={c.wf2_ah_profile_image} name={`${c.wf2_ah_first_name} ${c.wf2_ah_last_name}`} size="w-12 h-12" />
                                                        <div>
                                                            <p className="font-bold text-slate-900 text-sm">{c.wf2_ah_first_name} {c.wf2_ah_last_name}</p>
                                                            <p className="text-[9px] font-black text-blue-600 uppercase tracking-tighter">{c.wf2_ah_role}</p>
                                                        </div>
                                                    </div>
                                                    <span className="text-gray-300">›</span>
                                                </div>
                                            ))}
                                        </div>
                                    )}

                                    {clientTab === 'addresses' && (
                                        <div className="space-y-4">
                                            {facilities.filter(f => f.wf2_client === selectedClient.id).map(f => (
                                                <div key={f.id} className="bg-white p-5 rounded-[2.2rem] shadow-sm border border-white">
                                                    <div className="flex justify-between mb-2"><span className="px-2 py-0.5 bg-slate-900 text-white text-[8px] font-black rounded-full uppercase">SITE</span><span className="text-[10px] font-bold text-slate-300">{f.wf2_site_code}</span></div>
                                                    <p className="font-black text-slate-900 text-sm">{f.wf2_facility_name}</p>
                                                    <p className="text-xs text-slate-500 mt-1">{f.wf2_facility_address}</p>
                                                </div>
                                            ))}
                                        </div>
                                    )}

                                    {clientTab === 'details' && (
                                        <div className="space-y-4">
                                            <div className="bg-white p-6 rounded-[2.5rem] shadow-sm space-y-6">
                                                <div className="flex justify-between items-center"><div><p className="text-[9px] font-black text-slate-400 uppercase">Billing Logic</p><p className="font-bold text-slate-900 text-sm">Bill through Parent</p></div><div className="w-12 h-6 bg-blue-600 rounded-full flex items-center px-1"><div className="w-4 h-4 bg-white rounded-full ml-auto"></div></div></div>
                                                <div><p className="text-[9px] font-black text-slate-400 uppercase mb-2">Internal Notes</p><p className="text-sm font-medium text-slate-600">Company prefers PO required for all deep cleans.</p></div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {selectedContact && (
                            <div className="view-transition">
                                <div className="px-8 flex items-center justify-between mb-4">
                                    <button onClick={() => setSelectedContact(null)} className="w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center"><Icons.Back /></button>
                                    <div className="text-center">
                                        <p className="text-sm font-bold text-slate-900">{selectedContact.wf2_ah_first_name} {selectedContact.wf2_ah_last_name}</p>
                                        <p className="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Master Profile</p>
                                    </div>
                                    <div className="w-10" />
                                </div>

                                <div className="flex flex-col items-center mb-6">
                                    <Avatar src={selectedContact.wf2_ah_profile_image} name={`${selectedContact.wf2_ah_first_name} ${selectedContact.wf2_ah_last_name}`} size="w-24 h-24" />
                                    <p className="text-[11px] font-bold text-blue-500 uppercase mt-4">{selectedContact.wf2_ah_email}</p>
                                </div>

                                <div className="px-8">
                                    <div className="flex bg-slate-200/50 p-1 rounded-2xl mb-8">
                                        {[
                                            {id:'threads',icon:Icons.Hash},
                                            {id:'messaging',icon:Icons.Message},
                                            {id:'profile',icon:Icons.User},
                                            {id:'history',icon:Icons.Clock}
                                        ].map(t => {
                                            const Icon = t.icon || (() => null);
                                            return (
                                                <button key={t.id} onClick={() => setContactSubTab(t.id)} className={`flex-1 py-2 rounded-xl flex flex-col items-center gap-1 transition-all ${contactSubTab === t.id ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-400'}`}>
                                                    <Icon />
                                                    <span className="text-[8px] font-black uppercase tracking-widest">{t.id}</span>
                                                </button>
                                            );
                                        })}
                                    </div>

                                    {contactSubTab === 'profile' && (
                                        <div className="space-y-4 pb-20">
                                            <div className="bg-white p-5 rounded-[2rem] shadow-sm border border-white flex items-center justify-between">
                                                <div className="flex items-center gap-4">
                                                    <div className="w-12 h-12 bg-blue-50 text-blue-500 rounded-2xl flex items-center justify-center"><Icons.Mobile /></div>
                                                    <div><p className="text-[9px] font-black text-slate-400 uppercase tracking-widest">MOBILE</p><p className="font-bold text-slate-900">{selectedContact.wf2_ah_phone}</p></div>
                                                </div>
                                                <Icons.Phone />
                                            </div>
                                            <div className="bg-white p-5 rounded-[2rem] shadow-sm border border-white opacity-50 flex items-center justify-between">
                                                <div className="flex items-center gap-4">
                                                    <div className="w-12 h-12 bg-slate-50 text-slate-400 rounded-2xl flex items-center justify-center"><Icons.Phone /></div>
                                                    <div><p className="text-[9px] font-black text-slate-400 uppercase tracking-widest">WORK</p><p className="font-bold text-slate-900">555-9000</p></div>
                                                </div>
                                                <Icons.Phone />
                                            </div>
                                            <div className="bg-white p-5 rounded-[2rem] shadow-sm border border-emerald-50 flex items-center gap-4">
                                                <div className="w-12 h-12 bg-emerald-50 text-emerald-500 rounded-2xl flex items-center justify-center"><Icons.Briefcase /></div>
                                                <div><p className="text-[9px] font-black text-slate-400 uppercase tracking-widest">POSITION / PARENT</p><p className="font-bold text-slate-900 text-sm">Primary Decision Maker</p><p className="text-[10px] text-emerald-600 font-bold uppercase">{selectedClient?.wf2_company_name}</p></div>
                                            </div>
                                        </div>
                                    )}

                                    {contactSubTab === 'threads' && (
                                        <div className="relative pl-6 space-y-8 pb-20">
                                            <div className="timeline-line"></div>
                                            <div className="relative"><div className="timeline-dot active"></div><div className="bg-white border border-slate-100 p-5 rounded-[1.8rem] shadow-sm ml-4"><p className="font-bold text-slate-900 text-sm">Inbound Inquiry</p><p className="text-xs text-slate-500 mt-1 leading-relaxed">Called to confirm the PO #2299.</p></div></div>
                                        </div>
                                    )}

                                    {contactSubTab === 'history' && (
                                        <div className="bg-slate-50 rounded-[2.2rem] p-6 space-y-4">
                                            <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Profile Audit Log</p>
                                            <div className="space-y-4"><div className="flex items-center gap-3"><div className="w-2 h-2 rounded-full bg-green-500"></div><p className="text-xs font-bold text-slate-600 flex-1">Created by Admin</p></div></div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </div>

                    <nav className="absolute bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-md shrink-0 z-[1000]">
                        <div className="glass-dock h-20 rounded-[2.8rem] flex items-center justify-around px-4 shadow-2xl border border-white/50">
                            {[
                                { id: 'console', icon: Icons.Console },
                                { id: 'clients', icon: Icons.Users },
                                { id: 'board', icon: Icons.Board },
                                { id: 'locations', icon: Icons.Globe }
                            ].map(btn => {
                                const Icon = btn.icon || (() => null);
                                return (
                                    <button 
                                        key={btn.id}
                                        onClick={() => { setTab(btn.id); setSelectedClient(null); setSelectedContact(null); setSelectedFacility(null); }}
                                        className={`w-14 h-14 rounded-2xl flex items-center justify-center transition-all duration-300 ${tab === btn.id ? 'bg-slate-900 text-white shadow-xl scale-110' : 'text-slate-400 hover:text-slate-600'}`}
                                    >
                                        <Icon />
                                    </button>
                                );
                            })}
                        </div>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
