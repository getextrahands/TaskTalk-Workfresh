<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WorkFresh Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#ffffff">
    
    <link rel="apple-touch-icon" href="https://res.cloudinary.com/dwmsgnm4p/image/upload/q_auto/f_auto/v1778012864/w_lou9fx.png">
    <link rel="icon" type="image/png" href="https://res.cloudinary.com/dwmsgnm4p/image/upload/q_auto/f_auto/v1778012864/w_lou9fx.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root { 
            --app-black: #000000; 
            --app-gray: #8e8e93; 
            --app-light-gray: #f2f2f7;
            --app-border: rgba(0,0,0,0.1);
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent; 
            background-color: #ffffff; 
            color: var(--app-black); 
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: fixed;
        }

        .safe-top { padding-top: env(safe-area-inset-top); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        
        .glass-header { 
            backdrop-filter: blur(20px) saturate(180%); 
            -webkit-backdrop-filter: blur(20px) saturate(180%); 
            background: rgba(255,255,255,0.85);
            border-bottom: 0.5px solid var(--app-border);
        }

        .dialer-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            width: 100%;
            max-width: 280px;
            margin: 0 auto;
        }
        
        .dial-btn {
            aspect-ratio: 1/1;
            border-radius: 9999px;
            background-color: var(--app-light-gray);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: background-color 0.1s;
            border: none;
            cursor: pointer;
        }
        .dial-btn:active { background-color: #d1d1d6; }
        .dial-btn .digit { font-size: 2rem; font-weight: 400; line-height: 1; }
        .dial-btn .letters { font-size: 0.65rem; font-weight: 500; letter-spacing: 0.05em; color: var(--app-gray); margin-top: 2px; }

        .nav-icon { width: 24px; height: 24px; }
        .nav-label { font-size: 10px; font-weight: 500; margin-top: 4px; letter-spacing: 0.02em; }
        
        .contact-row { border-bottom: 0.5px solid rgba(0,0,0,0.05); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .contact-input { 
            width: 100%; 
            padding: 12px 0; 
            border-bottom: 0.5px solid #d1d1d6; 
            font-size: 16px; 
            background: transparent; 
            outline: none;
            border-radius: 0;
        }
        .contact-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--app-gray);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-top: 16px;
            display: block;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .view-anim { animation: fadeIn 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, setDoc, serverTimestamp, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect, useMemo, useRef } = React;

        // Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyB-n1St2D0c5k66udqtrktzWWgYDtoBjIM",
            authDomain: "tasktalk-professional.firebaseapp.com",
            projectId: "tasktalk-professional",
            storageBucket: "tasktalk-professional.firebasestorage.app",
            messagingSenderId: "1038829850811",
            appId: "1:1038829850811:web:0ff822d0afa7f25a87999e"
        };

        const rawAppId = typeof __app_id !== 'undefined' ? __app_id : 'TaskTalk-Workfresh';
        const appId = rawAppId.replace(/\//g, '_');

        const CONFIG = {
            number: "+13014506478",
            defaultAvatar: "https://res.cloudinary.com/dwmsgnm4p/image/upload/q_auto/f_auto/v1778012864/w_lou9fx.png"
        };

        const MOCK_DATA = {
            contacts: [
                { id: 'm1', name: 'Julian Vance', company: 'Vertex Holdings', number: '+15550102030', division: 'WorkFresh', logo: CONFIG.defaultAvatar },
                { id: 'm2', name: 'Elena Rodriguez', company: 'Nova Design', number: '+15550998877', division: 'WorkFresh', logo: 'https://i.pravatar.cc/150?u=elena' }
            ]
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const Icons = {
            Dialer: (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" {...props} className={`nav-icon ${props.className || ''}`}><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/><circle cx="12" cy="19" r="1"/><circle cx="19" cy="19" r="1"/><circle cx="5" cy="19" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="19" cy="5" r="1"/><circle cx="5" cy="5" r="1"/></svg>,
            Contacts: (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props} className={`nav-icon ${props.className || ''}`}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
            Phone: (props) => <svg viewBox="0 0 24 24" fill="currentColor" {...props} className={`w-8 h-8 ${props.className || ''}`}><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7 2 2 0 0 1 1.72 2.23z" /></svg>,
            Camera: (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props} className={`w-5 h-5 ${props.className || ''}`}><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>,
            Back: (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" {...props} className={`w-6 h-6 ${props.className || ''}`}><path d="m15 18-6-6 6-6"/></svg>,
            Plus: (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" {...props} className={`w-6 h-6 ${props.className || ''}`}><path d="M12 5v14m-7-7h14"/></svg>,
            Delete: (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props} className={`w-5 h-5 ${props.className || ''}`}><path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [dbConnected, setDbConnected] = useState(false);
            const [view, setView] = useState('dialer');
            const [dialNumber, setDialNumber] = useState('');
            const [contacts, setContacts] = useState(MOCK_DATA.contacts);
            const [editContact, setEditContact] = useState(null);
            const [isSaving, setIsSaving] = useState(false);
            const [toast, setToast] = useState(null);
            
            const fileInput = useRef(null);

            const showToast = (message, type = 'info') => {
                setToast({ message, type });
                setTimeout(() => setToast(null), 5000);
            };

            // Auth Initialization
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        const result = await signInAnonymously(auth);
                        console.log("Auth Success. UID:", result.user.uid);
                    } catch (e) {
                        console.error("Auth Error:", e);
                        showToast("Authentication Failed", "error");
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            // Real-time Data Sync
            useEffect(() => {
                if (!user) return;
                
                const colPath = collection(db, 'artifacts', appId, 'public', 'data', 'contacts');
                console.log("Syncing Path:", colPath.path);

                const unsub = onSnapshot(colPath, (snap) => {
                    setDbConnected(true);
                    const dbData = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    const filtered = dbData.filter(i => i.division === 'WorkFresh');
                    
                    const merged = [...filtered];
                    MOCK_DATA.contacts.forEach(m => {
                        if (!merged.find(d => d.number === m.number)) merged.push(m);
                    });
                    setContacts(merged);
                }, (err) => {
                    setDbConnected(false);
                    console.error("Firestore Listen Error:", err);
                    if (err.message.includes('permission')) {
                        showToast("Blocked: Check Firebase Rules", "error");
                    }
                });

                return () => unsub();
            }, [user]);

            const handleSaveContact = async () => {
                if (!user || !editContact || isSaving) return;
                
                setIsSaving(true);
                const dataToSave = { 
                    ...editContact, 
                    division: 'WorkFresh',
                    lastSync: serverTimestamp() 
                };

                console.log("Saving data...", dataToSave);

                try {
                    const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'contacts');
                    
                    let docRef;
                    if (editContact.id && !editContact.id.toString().startsWith('m')) {
                        docRef = doc(db, 'artifacts', appId, 'public', 'data', 'contacts', editContact.id);
                        await setDoc(docRef, dataToSave);
                    } else {
                        const { id, ...cleanData } = dataToSave;
                        docRef = await addDoc(colRef, cleanData);
                    }
                    
                    console.log("Save complete! Document ID:", docRef.id);
                    showToast("Saved Successfully", "success");
                    setEditContact(null);
                } catch (e) { 
                    console.error("Save Error:", e);
                    showToast(e.message.includes('permission') ? "Rules Error: Check Console" : "Failed to Save", "error");
                } finally {
                    setIsSaving(false);
                }
            };

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onloadend = () => {
                    setEditContact(prev => ({...prev, logo: reader.result}));
                };
                reader.readAsDataURL(file);
            };

            if (!user) return (
                <div className="h-screen flex flex-col items-center justify-center bg-white gap-4">
                    <div className="w-8 h-8 border-2 border-black border-t-transparent rounded-full animate-spin"></div>
                    <p className="text-[10px] font-bold uppercase tracking-widest text-slate-300">Establishing Sync</p>
                </div>
            );

            return (
                <div className="h-screen flex flex-col max-w-lg mx-auto bg-white overflow-hidden shadow-2xl relative border-x border-slate-100">
                    {toast && (
                        <div className={`fixed top-4 left-1/2 -translate-x-1/2 z-[1000] px-6 py-3 rounded-full text-[11px] font-bold uppercase tracking-widest shadow-2xl transition-all ${toast.type === 'error' ? 'bg-red-500 text-white' : toast.type === 'success' ? 'bg-green-600 text-white' : 'bg-black text-white'}`}>
                            {toast.message}
                        </div>
                    )}

                    <header className="safe-top glass-header h-14 flex items-center justify-between px-6 shrink-0 z-50">
                        {editContact ? (
                            <div className="flex items-center w-full">
                                <button onClick={() => setEditContact(null)} className="text-blue-500 flex items-center gap-1"><Icons.Back /><span className="text-sm font-medium">Back</span></button>
                                <div className="flex-1 text-center font-bold text-sm tracking-tight truncate">New Contact</div>
                                <button onClick={handleSaveContact} disabled={isSaving} className="text-blue-500 font-bold text-sm">
                                    {isSaving ? '...' : 'Done'}
                                </button>
                            </div>
                        ) : (
                            <>
                                <div className="flex items-center gap-3">
                                    <div className="relative">
                                        <div className="w-8 h-8 rounded-lg overflow-hidden border border-slate-100 bg-slate-50">
                                            <img src={CONFIG.defaultAvatar} className="w-full h-full object-cover" />
                                        </div>
                                        {/* Connection Status Dot */}
                                        <div className={`absolute -top-1 -right-1 w-2.5 h-2.5 rounded-full border-2 border-white ${dbConnected ? 'bg-green-500' : 'bg-red-500 animate-pulse'}`} />
                                    </div>
                                    <div className="font-bold text-xs uppercase italic leading-tight">WorkFresh</div>
                                </div>
                                <div className="text-[10px] font-bold tracking-tight bg-gray-50 px-2 py-1 rounded-md border border-gray-100 tabular-nums">{CONFIG.number}</div>
                            </>
                        )}
                    </header>

                    <main className="flex-1 overflow-y-auto no-scrollbar relative bg-white">
                        {view === 'dialer' && !editContact && (
                            <div className="h-full flex flex-col items-center justify-center p-8 view-anim">
                                <div className="text-4xl font-light mb-10 h-12 flex items-center tracking-tight tabular-nums">
                                    {dialNumber || <span className="text-gray-100">000 000 0000</span>}
                                </div>
                                <div className="dialer-grid">
                                    {['1','2','3','4','5','6','7','8','9','*','0','#'].map(n => (
                                        <button key={n} onClick={() => setDialNumber(d => d + n)} className="dial-btn">
                                            <span className="digit">{n}</span>
                                        </button>
                                    ))}
                                </div>
                                <div className="mt-12">
                                    <button onClick={() => showToast("Calling...")} className="w-16 h-16 bg-green-500 text-white rounded-full flex items-center justify-center shadow-lg active:scale-95 transition-transform"><Icons.Phone className="w-6 h-6" /></button>
                                </div>
                            </div>
                        )}

                        {view === 'peeps' && !editContact && (
                            <div className="view-anim">
                                <div className="flex justify-between items-center p-5">
                                    <span className="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Contacts</span>
                                    <button onClick={() => setEditContact({})} className="text-blue-500"><Icons.Plus /></button>
                                </div>
                                {contacts.map(c => (
                                    <div key={c.id} onClick={() => setEditContact(c)} className="flex items-center gap-4 p-4 active:bg-gray-50 contact-row">
                                        <div className="w-11 h-11 rounded-full overflow-hidden border border-gray-100 bg-gray-50 shrink-0">
                                            <img src={c.logo || CONFIG.defaultAvatar} className="w-full h-full object-cover" />
                                        </div>
                                        <div>
                                            <div className="font-bold text-sm">{c.name || 'Unnamed'}</div>
                                            <div className="text-[9px] font-bold text-gray-400 uppercase tracking-widest">{c.company || 'Direct'}</div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {editContact && (
                            <div className="view-anim p-8 bg-white min-h-full">
                                <div className="flex flex-col items-center mb-8">
                                    <div className="relative">
                                        <div className="w-28 h-28 rounded-full overflow-hidden border-2 border-gray-50 shadow-sm bg-gray-50 flex items-center justify-center">
                                            {editContact.logo ? <img src={editContact.logo} className="w-full h-full object-cover" /> : <Icons.Contacts className="w-10 h-10 text-gray-200" />}
                                        </div>
                                        <button onClick={() => fileInput.current.click()} className="absolute bottom-0 right-0 w-8 h-8 bg-black text-white rounded-full flex items-center justify-center border-2 border-white"><Icons.Camera className="w-4 h-4"/></button>
                                        <input type="file" ref={fileInput} className="hidden" onChange={handleImageUpload} accept="image/*" />
                                    </div>
                                </div>
                                <div className="space-y-1">
                                    {['name', 'company', 'number', 'email', 'address'].map(k => (
                                        <div key={k}>
                                            <label className="contact-label">{k}</label>
                                            <input className="contact-input" placeholder={`Enter ${k}...`} value={editContact[k]||''} onChange={e => setEditContact({...editContact, [k]: e.target.value})} />
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    {!editContact && (
                        <nav className="safe-bottom glass-header h-20 flex justify-around items-center px-4 shrink-0 z-50">
                            {[
                                {id: 'dialer', icon: Icons.Dialer, label: 'Dialer'},
                                {id: 'peeps', icon: Icons.Contacts, label: 'Contacts'}
                            ].map(t => (
                                <button key={t.id} onClick={() => setView(t.id)} className={`flex flex-col items-center gap-0.5 flex-1 transition-colors ${view === t.id ? 'text-black' : 'text-gray-300'}`}>
                                    <t.icon />
                                    <span className="nav-label uppercase tracking-widest">{t.label}</span>
                                </button>
                            ))}
                        </nav>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
