    const COLLECTIONS = Object.keys(MOCK_DATA);
    const execBtn = document.getElementById('execBtn');

    const progressBar = document.getElementById('progressBar');
    const progressContainer = document.getElementById('progressContainer');
    const colGrid = document.getElementById('colGrid');
    const template = document.getElementById('colItem');

    COLLECTIONS.forEach(col => {
        const clone = template.content.cloneNode(true);
        clone.querySelector('.name-text').textContent = col.toUpperCase();
        clone.querySelector('div').id = `status-${col}`;
        colGrid.appendChild(clone);
    });

    function log(msg, type = 'info') {
        const div = document.createElement('div');
        div.className = type === 'error' ? 'text-red-400' : type === 'success' ? 'text-emerald-400' : 'text-blue-400';
        div.textContent = `> ${msg}`;
        logBox.appendChild(div);
        logBox.scrollTop = logBox.scrollHeight;
    }

    async function initAuth() {
        try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        } catch (e) { log("Auth Error: " + e.message, "error"); }
    }

    onAuthStateChanged(auth, (user) => {
        if (user) {
            const indicator = document.getElementById('connectionStatus');
            indicator.innerHTML = `<span class="status-dot status-success"></span> CONNECTED`;
            indicator.classList.replace('text-slate-400', 'text-emerald-400');
        }
    });

    execBtn.addEventListener('click', async () => {
        execBtn.disabled = true;
        progressContainer.classList.remove('hidden');
        log("DEPLOYING MASTER SCHEMA (17 COLLECTIONS)...");
        try {
            let count = 0;
            for (const col of COLLECTIONS) {
                const record = MOCK_DATA[col];
                log(`Processing Table: ${col.toUpperCase()}...`);
                // RULE 1 Path: artifacts/{appId}/public/data/{collectionName}/{documentId}
                const ref = doc(db, 'artifacts', appId, 'public', 'data', col, record.id);
                await setDoc(ref, record.data);
                count++;
                
                progressBar.style.width = `${Math.round((count / COLLECTIONS.length) * 100)}%`;
                const el = document.getElementById(`status-${col}`);
                if (el) {
                    el.classList.replace('text-slate-500', 'text-emerald-400');
                    el.querySelector('.check-icon').textContent = '✓';
                }
                await new Promise(r => setTimeout(r, 150));
            }
            log("ALL 17 TABLES PROVISIONED SUCCESSFULLY.", "success");
            execBtn.innerText = "DEPLOYMENT COMPLETE";
            execBtn.classList.replace('bg-blue-600', 'bg-emerald-600');
        } catch (err) {
            log("FATAL ERROR: " + err.message, "error");
            execBtn.disabled = false;
        }
    });

    initAuth();
